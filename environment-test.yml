name: ggpymanager-test
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python>=3.10
  
  # Core testing
  - pytest>=8.0.0
  - pytest-cov>=4.1.0
  - pytest-xdist>=3.5.0
  - pytest-mock>=3.12.0
  
  # Coverage
  - coverage>=7.4.0
  
  # Scientific stack (if needed for your package)
  - numpy
  - xarray
  - pandas
  - scipy
  - rasterio
  - rioxarray
  - geopandas
  - matplotlib
  - dask
  
  # Utility
  - tqdm
  - click
  - pydantic
  - pyyaml
  
  # Development
  - pip
  
  # Install local package in dev mode via pip
  - pip:
      - -e .
