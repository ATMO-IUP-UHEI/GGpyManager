## OUTPUT FILES

### Concentration Output (.con files)
# **Status**: [OUTPUT]
# **Format**: Binary files (or ASCII if ASCiiResults enabled)
# **Purpose**: 2D concentration fields at each height slice
# **Naming**: XXXXX-YZZ.con (X=situation, Y=slice, Z=source group)
# **Compression**: Can be zipped to .grz format (see in.dat Line 15)
# **Content**: Concentration grid data for post-processing
# **GUI Use**: Required for visualization and analysis

### Odour Intensity Output (.odr files)
# **Status**: [OUTPUT] (only if Pollutant.txt contains "odour")
# **Format**: Binary files (concentrations variance)
# **Purpose**: Odour concentration fluctuation data for odour hour calculation
# **Content**: Mean and variance concentrations for statistical odour assessment
# **GUI Use**: Required for odour impact analysis

### Deposition Output (.dep files)
# **Status**: [OUTPUT] (only if dry or wet deposition enabled)
# **Format**: Binary files
# **Purpose**: Particle deposition maps (kg/m²/year or similar units)
# **Content**: Deposition values at each grid cell
# **GUI Use**: Post-processing and deposition impact assessment

### Flow Field Output (.gff files)
# **Status**: [OUTPUT] (only if "Save intermediate GRAL flow files" enabled)
# **Format**: Compressed binary files (.gff = GRAL flow field)
# **Purpose**: 3D wind field around obstacles
# **When Generated**: If in.dat option enabled (typically for multi-run projects)
# **Use**: Reuse for subsequent simulations to save computation time
# **Compression**: Uses zipped format automatically

### GRAL Geometries File
# **Status**: [OUTPUT]
# **Format**: Binary
# **Purpose**: Associates .gff files with topography/building geometry
# **Generated**: When saving intermediate flow fields

### Receptor Time Series (zeitreihe.dat / ReceptorTimeseries.dat)
# **Status**: [OUTPUT] (only if receptor.dat provided and receptor flag enabled)
# **Format**: Text file (space or tab-separated)
# **Purpose**: Concentration time series at each receptor point
# **Content**: One column per receptor, one row per weather situation
# **Versions**:
#   - zeitreihe.dat (up to V20.01, binary format)
#   - ReceptorTimeseries.dat (V20.09+, text format, easier to read)

### Receptor Meteorology File (GRALMeteozeitreihe.dat)
# **Status**: [OUTPUT]
# **Format**: Tab-separated text (V20.06+; binary V19.01)
# **Purpose**: Computed wind vectors at receptor points
# **Content**:
#   - U and V wind components (m/s)
#   - Stability class (numeric)
#   - Boundary layer height (m)
# **Versions**:
#   - V19.01 and earlier: Binary format (outdated)
#   - V20.06+: Text format with header line

### Receptor Time Series Transient (ReceptorTimeseriesTransient.txt)
# **Status**: [OUTPUT] (only in transient mode)
# **Format**: Tab-separated text file
# **Purpose**: Receptor concentrations with statistical error estimates
# **Content**:
#   - Concentrations at each receptor per weather situation
#   - Statistical error estimates (last line)
#   - Computed meteorological data at receptors
# **Use**: Assess uncertainty in receptor values

### Vertical Concentrations (VerticalConcentrations.txt)
# **Status**: [OUTPUT] (only if requested; transient mode)
# **Format**: Text file
# **Purpose**: Vertical profiles of concentration layers
# **Content**: Mean concentrations in each vertical layer after simulation

### Building Heights (Buildingheights.txt)
# **Status**: [OUTPUT] (only if in.dat Line 14 = -2)
# **Format**: ESRI ASCII raster
# **Purpose**: Actual building heights as used in model
# **Note**: Heights may differ from input (buildings.dat) due to grid discretization

### GRAL Topography (GRALTopography.txt)
# **Status**: [OUTPUT] (only if requested)
# **Format**: ESRI ASCII raster
# **Purpose**: Exact topography used in GRAL model
# **Use**: Verification of terrain representation

### Log Files
# **Status**: [OUTPUT]
# **Files**:
#   - LogfileGRALCore.txt: GRAL computation core output
#   - GUI log files: Graphical interface operations
# **Purpose**: Debugging and error diagnostics
# **Content**: Particle counts, error messages, processing status

### Result Metadata
# **Status**: [OUTPUT]
# **File**: May include .grz metadata if compressed output enabled
# **Purpose**: Compression information and file listing

