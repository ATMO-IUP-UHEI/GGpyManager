## TRANSIENT MODE CONFIGURATION

### mettimeseries.dat
# **Status**: [MANDATORY-CONDITIONAL]
# **Conditional On**: Using GRAL transient mode (in.dat Line 3 = 0)
# **Used by**: GRAL.exe
# **Purpose**: Defines time series of meteorological conditions
# **Format**: Text file with date/time and atmospheric data
# **Structure**:
#   - Date/time information (HH:MM or HH.MM format)
#   - Wind speed, direction, stability class, frequency
#   - One line per weather situation (time step)
# **Alignment Requirements**:
#   - Same number of entries as Precipitation.txt (if used)
#   - Same number of entries as Emissionstimeseries.txt (if used)
#   - Determines sequence and duration of dispersion calculations
# **Default Behavior if Missing** (transient mode): Simulation fails
# **Notes**:
#   - Delimiter: space, comma, tab, or semicolon
#   - Date format: colon, hyphen, or dot separators
#   - Defines overall simulation period duration
#   - Requires GUI to generate properly in most cases

### emissionstimeseries.txt
# **Status**: [OPTIONAL-RECOMMENDED] (for transient mode)
# **Used by**: GUI, GRAL.exe (transient mode only)
# **Purpose**: Modulates emissions for each weather situation
# **When to Use**:
#   - Transient mode with time-varying emissions
#   - Different emission factors for different hours/seasons
# **Format**: Text file with header and hourly modulation factors
# **Structure**:
#   - Header line: Date, Hour, Source_Group_1, Source_Group_2, ...
#   - Data lines: One per weather situation in mettimeseries.dat
#   - Each cell: emission modulation factor (dimensionless multiplier)
#   - Delimiter: tab, semicolon, hyphen, space, or colon
# **Alignment Requirement**:
#   - Number of rows MUST match mettimeseries.dat
#   - Columns must correspond to defined source groups
# **Default Behavior if Missing**: All emissions constant (factor = 1.0)
# **Notes**:
#   - Factors typically 0-2 (0 = off, 1 = nominal, 2 = double)
#   - Created by copying mettimeseries.dat and adding emission columns
#   - Date/time MUST match mettimeseries.dat exactly

### TimeSeriesPointSourceVel.txt
# **Status**: [OPTIONAL]
# **Used by**: GRAL.exe (transient mode) and GUI
# **Purpose**: Time-varying exit velocities for point sources/stacks
# **When Required**:
#   - Transient mode with variable stack exit velocities
#   - Industrial sources with changing operating conditions
# **Format**: Tab-separated text file with header and time series
# **Structure**:
#   - Header line: Date, Hour, Source_Name_1, Source_Name_2, ...
#   - Data lines: One per weather situation in mettimeseries.dat
#   - Each cell: exit velocity (m/s) for that source at that time
# **Reference**:
#   - Linked via point.dat column "Vel" (reference name)
#   - Must match mettimeseries.dat line count exactly
# **Default Behavior if Missing**: Uses constant exit velocity from point.dat
# **Notes**:
#   - Delimiter: tab or comma
#   - Date/time format must match mettimeseries.dat
#   - Source names from point.dat "Vel" reference column

### TimeSeriesPointSourceTemp.txt
# **Status**: [OPTIONAL]
# **Used by**: GRAL.exe (transient mode) and GUI
# **Purpose**: Time-varying exit temperatures for point sources
# **When Required**:
#   - Transient mode with variable stack temperatures
#   - Buoyancy effects time-dependent
# **Format**: Tab-separated text file, same structure as TimeSeriesPointSourceVel.txt
# **Structure**:
#   - Header line: Date, Hour, Source_Name_1, Source_Name_2, ...
#   - Data lines: One per weather situation
#   - Each cell: exit temperature difference above ambient (K)
# **Reference**:
#   - Linked via point.dat column "Temp" (reference name)
#   - Must match mettimeseries.dat line count exactly
# **Default Behavior if Missing**: Uses constant temperature from point.dat
# **Notes**:
#   - Temperature difference (not absolute temperature)
#   - Negative values supported (cooler than ambient)
#   - Affects plume rise calculation

### TimeSeriesPortalSourceVel.txt
# **Status**: [OPTIONAL]
# **Used by**: GRAL.exe (transient mode)
# **Purpose**: Time-varying exit velocities for tunnel portals
# **Format**: Same as TimeSeriesPointSourceVel.txt
# **Reference**: Linked via portals.dat "Vel" column
# **Notes**: For tunnel jet exit velocities in transient mode

### TimeSeriesPortalSourceTemp.txt
# **Status**: [OPTIONAL]
# **Used by**: GRAL.exe (transient mode)
# **Purpose**: Time-varying temperature differences for tunnel jets
# **Format**: Same as TimeSeriesPointSourceVel.txt
# **Reference**: Linked via portals.dat "Temp" column
# **Notes**: For tunnel jet temperature differences (negative or positive)

---

## ADVANCED CONFIGURATION (OPTIONAL)

### MaxProc.txt
# **Status**: [OPTIONAL-RECOMMENDED]
# **Used by**: GRAMM.exe, GRAL.exe
# **Purpose**: Limits maximum parallel processor cores for computation
# **When to Use**:
#   - Computer has many cores but limited memory
#   - Running multiple simulations simultaneously
#   - Testing or debugging (single core)
# **Format**: Single-line text file
# **Content**: Integer number (1 to system maximum)
# **Default Behavior if Missing**: Uses all available processor cores
# **Notes**:
#   - Value can exceed actual core count; system will use available cores
#   - Recommended: total_cores - 1 (reserve one for OS)
#   - Can significantly reduce memory footprint

### Microvertlayers.txt
# **Status**: [MANDATORY]
# **Used by**: GRAL.exe, GUI
# **Purpose**: Defines number of vertical layers in prognostic flow field
# **Format**: Single integer line
# **Content**: Number of vertical prognostic layers (typical: 15-50)
# **Important Notes**:
#   - Above this height, wind fields computed diagnostically
#   - Critical for flow field accuracy around buildings
#   - Affects memory and computation time significantly
# **Default Behavior if Missing**: Simulation fails; must be defined

### Relaxationfactors.txt
# **Status**: [OPTIONAL]
# **Used by**: GRAL.exe, GUI
# **Purpose**: Sets convergence relaxation factors for prognostic flow field
# **Format**: Two lines
# **Content**:
#   Line 1: Velocity relaxation factor (default: 0.1)
#   Line 2: Pressure relaxation factor (default: 1.0)
# **Default Behavior if Missing**: Uses default values (0.1, 1.0)
# **Notes**:
#   - Lower values = slower convergence but more stability
#   - Rarely needs modification

### Turbulencemodel.txt
# **Status**: [OPTIONAL]
# **Used by**: GRAL.exe
# **Purpose**: Selects turbulence closure model for prognostic flow field
# **Format**: Single integer line
# **Options**:
#   0 = No diffusion (unrealistic)
#   1 = Mixing-length model [DEFAULT if file missing]
#   2 = Standard k-ε model (alternative)
# **Default Behavior if Missing**: Uses mixing-length model (option 1)
# **Notes**:
#   - Mixing-length model recommended for most applications
#   - k-ε model for comparison studies

### Integrationtime.txt
# **Status**: [OPTIONAL-RECOMMENDED]
# **Used by**: GRAL.exe, GUI
# **Purpose**: Sets iteration limits for prognostic flow field convergence
# **Format**: Two lines
# **Content**:
#   Line 1: Minimum iterations (default: 100)
#   Line 2: Maximum iterations (default: 500)
# **Default Behavior if Missing**: Uses defaults (100, 500)
# **Notes**:
#   - Model validated with default maximum
#   - Increasing minimum = more accurate but slower
#   - Increasing maximum only helps if "Run until steady state" is OFF

### Buildingroughness.txt
# **Status**: [OPTIONAL-RECOMMENDED]
# **Used by**: GRAL.exe, GUI
# **Purpose**: Sets surface roughness for building walls
# **Format**: Single line, decimal number (m)
# **Content**: Roughness length for obstacles (default: 0.001 m = 1 mm)
# **Default Behavior if Missing**: Uses 0.001 m
# **Notes**:
#   - Rarely needs modification
#   - Typical range: 0.001 - 0.01 m
#   - Affects wall friction in prognostic calculations

### Tunnelentrance.txt
# **Status**: [OPTIONAL]
# **Used by**: GRAL.exe
# **Purpose**: Removes particles at tunnel entrance (suction effect)
# **When to Use**: Modeling tunnel air intake effects
# **Format**: Text file with grid cell coordinates
# **Structure**:
#   - X-coordinate of grid cell
#   - Y-coordinate of grid cell
#   - Column 3-4: [NOT USED CURRENTLY]
# **Default Behavior if Missing**: No tunnel entrance effect
# **Notes**: Simplified modeling of tunnel portal suction

### Oppositelane.txt
# **Status**: [OPTIONAL]
# **Used by**: GRAL.exe
# **Purpose**: Transition zone where tunnel jet effects cease
# **When to Use**: Modeling opposite roadway in highway tunnel scenario
# **Format**: Text file with grid cell coordinates (same as Tunnelentrance.txt)
# **Default Behavior if Missing**: No opposite lane effects
# **Notes**: Used for traffic tunnel modeling on opposite lanes

### Transconcthreshold.txt
# **Status**: [OPTIONAL-RECOMMENDED] (for transient mode)
# **Used by**: GRAL.exe (transient mode)
# **Purpose**: Threshold for discarding old concentrations in transient mode
# **When to Use**:
#   - Transient simulations with potentially slow convergence
#   - Accelerating computation
#   - Long time-series simulations
# **Format**: Single line, decimal number (μg/m³ or relevant unit)
# **Content**: Concentration threshold below which previous values ignored
# **Default Behavior if Missing**: No threshold; all history retained
# **Trade-offs**:
#   - Higher threshold = faster computation, less accurate
#   - Lower threshold = slower computation, more accurate
#   - Recommended: 5-10% of expected peak concentrations
# **Notes**: Only used in transient mode; affects accuracy-speed tradeoff

### RoughnessLengthsGral.dat
# **Status**: [OPTIONAL]
# **Used by**: GRAL.exe
# **Purpose**: Spatially-varying surface roughness (overrides Adaptive Roughness)
# **When to Use**:
#   - Complex terrain with varying land-use types
#   - Custom roughness specification by location
#   - Supersedes in.dat Line 18 (Adaptive Roughness)
# **Format**: ESRI ASCII raster file
# **Grid Requirements**:
#   - Must match GRAL flow field grid exactly
#   - Cell size, extent, and origin must be identical
# **Content**: Roughness length values (m) for each grid cell
# **Default Behavior if Missing**: Uses in.dat settings
# **Notes**: Requires in.dat Line 18 > 0 (Adaptive Roughness enabled)

### VegetationDepoFactor.txt
# **Status**: [OPTIONAL]
# **Used by**: GRAL.exe
# **Purpose**: Scaling factor for deposition velocity in vegetation zones
# **Format**: Two lines
# **Content**:
#   Line 1: Scaling factor for gases, PM2.5, PM10 (default: 1.0)
#   Line 2: Scaling factor for PM30 and larger particles (default: 1.0)
# **Effect**:
#   - Factor < 1 = reduced deposition in vegetation
#   - Factor > 1 = enhanced deposition in vegetation
#   - Multiplied by vegetation coverage percentage
# **Default Behavior if Missing**: No enhancement/reduction (factors = 1.0)
# **Notes**: Factors below 1.0 reset to 1.0 automatically

### Buildingroughness.txt
# **Status**: [OPTIONAL-RECOMMENDED]
# **Used by**: GRAL.exe, GUI
# **Purpose**: Sets surface roughness for building walls
# **Format**: Single decimal number (m)
# **Default**: 0.001 m
# **Notes**: Rarely modified from default

