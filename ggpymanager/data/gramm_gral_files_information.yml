## GEOMETRY AND TOPOGRAPHY FILES

### buildings.dat
# **Status**: [OPTIONAL]
# **Used by**: GRAL.exe
# **Purpose**: Defines building/obstacle locations and heights
# **When Required**: Only if buildings affect wind flow (diagnostic or prognostic mode)
# **Format**: Text file, one building per line
# **Structure**:
#   Line 1+: Building data
#   Columns:
#     1. X-coordinate (m)
#     2. Y-coordinate (m)
#     3. Lower Z-coordinate (m) - [CURRENTLY NOT USED; buildings always reach ground]
#     4. Height of building above ground (m)
# **Height Interpretation**:
#   - If height value positive: interpreted as relative height above ground
#     (In terrain: roofs follow topography)
#   - If height value negative: interpreted as absolute height above sea level
#     (In terrain: flat roofs at specified elevation)
# **Default Behavior if Missing**: No buildings considered; no drag effects
# **Limitations**:
#   - Cannot model bridges (always reach ground, no spacing below)
#   - Column 3 reserved for future use
# **Notes**:
#   - One coordinate per cell; all cells containing coordinate are blocked
#   - Each grid cell checked: if cell center height ≤ building height, cell is blocked
#   - For flat terrain, use positive values (relative heights)
#   - For complex terrain, negative values recommended (flat roofs)

### buildings_raster.dat
# **Status**: [OPTIONAL] (alternative to buildings.dat)
# **Used by**: GRAL.exe
# **Purpose**: Alternative raster format for building definition
# **When to Use**:
#   - When building outlines from GIS available
#   - Large urban areas with many buildings
#   - As alternative to vector point format (buildings.dat)
# **Format**: ESRI ASCII raster file
# **Structure**: Grid of relative building heights (m) above terrain
#   - Must match flow field grid exactly (same cell size, extent, origin)
#   - Only positive values (relative heights)
#   - NoData for cells without buildings
# **Default Behavior if Missing**: Uses buildings.dat instead

### vegetation.dat
# **Status**: [OPTIONAL]
# **Used by**: GRAL.exe
# **Purpose**: Defines vegetation areas (forests, parks)
# **When Required**: Only if vegetation affects flow/deposition
# **Format**: Text file with structure lines and coordinate lines
# **Structure**:
#   Lines starting with "D": Vegetation descriptors
#     Column 1: "D" marker
#     Column 2: Total vegetation height (m)
#     Column 3: Trunk height as percentage of total height (%)
#     Column 4: Leaf-area density in trunk zone (m²/m³ = mm²/mm³)
#     Column 5: Leaf-area density in crown zone (m²/m³)
#     Column 6: Vegetation coverage (%)
#   Other lines: Coordinate assignments
#     Column 1: X-coordinate (m)
#     Column 2: Y-coordinate (m)
# **Default Behavior if Missing**: No vegetation effects; no increased deposition
# **Notes**:
#   - Used in V18.1 and later
#   - Affects flow field calculation and particle deposition

### ggeom.asc
# **Status**: [MANDATORY-CONDITIONAL]
# **Conditional On**: GRAL coupled with GRAMM (meteorological input flag 4 or 5 in in.dat)
# **Used by**: GRAL.exe, GRAMM.exe, GUI
# **Purpose**: Provides GRAMM grid information and topography data
# **Format**: Text file (small) OR binary (large) containing GRAMM grid
# **Content**:
#   - GRAMM grid cell information
#   - Topography/terrain elevation data
#   - If wind fields in different folder:
#     Line 1: Windows path to GRAMM wind field directory
#     Line 2: UNIX/Linux path (if applicable)
# **Default Behavior if Missing** (when GRAMM used): Simulation fails with error
# **Notes**:
#   - Detailed format described in GRAMM documentation
#   - Path separator: Windows (backward slash), Linux (forward slash)
#   - From V20.09: First line checked in UNIX systems first; if fails, uses Line 2

### landuse.asc
# **Status**: [MANDATORY-CONDITIONAL]
# **Conditional On**: GRAL coupled with GRAMM AND land-use effects desired
# **Used by**: GRAL.exe, GRAMM.exe, GUI
# **Purpose**: Provides spatially-varying land-use and surface properties
# **Format**: ESRI ASCII raster file
# **Content**: Land-use categories with associated roughness, albedo, etc.
# **Default Behavior if Missing** (when GRAMM used): Uses default homogeneous land-use
# **Grid Requirements**:
#   - Horizontal resolution ≤ GRAMM grid size
#   - Must cover entire GRAMM domain
# **Notes**:
#   - Categories use CORINE classification
#   - Determines surface roughness spatially
#   - Detailed land-use categories in GRAMM documentation

### GRALtopofile.txt
# **Status**: [OPTIONAL-RECOMMENDED] (needed for high-res terrain in GRAMM coupling)
# **Used by**: GRAL.exe
# **Purpose**: High-resolution topography for microscale flow field
# **When to Use**:
#   - GRAL coupled with GRAMM
#   - Fine-scale terrain variation needed
#   - Terrain resolution finer than GRAMM grid
# **Format**: ESRI ASCII raster file
# **Grid Requirements**:
#   - Horizontal resolution = GRAL flow field grid size
#   - Must exactly match GRAL domain extent
# **Default Behavior if Missing**: Uses GRAMM topography interpolated to GRAL grid
# **Notes**:
#   - Optional but improves terrain effects in complex regions
#   - Should match GRAL concentration grid domain

