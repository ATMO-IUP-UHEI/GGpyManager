# GRAMM/GRAL V22.09 File Information Reference
# Comprehensive documentation of all input and output files
# Last Updated: November 2025
# Note: Based on GRAL V22.09 and GRAL-ST-ROG documentation

---

## FILE STATUS LEGEND
# [MANDATORY] - File MUST be present; simulation will not run without it
# [MANDATORY-CONDITIONAL] - File required only for specific features (GRAMM coupling, etc)
# [OPTIONAL] - File can be omitted; model uses defaults or disables feature
# [OPTIONAL-RECOMMENDED] - File optional but strongly recommended for better results
# [OUTPUT] - Generated by the model

---

## INTERFACE FILES
## (Files defining GRAL simulation boundaries and basic parameters)

### GRAL.geb
# **Status**: [MANDATORY]
# **Used by**: GRAL.exe, GUI
# **Purpose**: Defines GRAL grid information and domain boundaries
# **Format**: Text file with exclamation marks (!) as separators between data and user info
# **Structure**:
#   Line 1: Horizontal cell size - x-direction (DDX) in meters (microscale flow field model)
#   Line 2: Horizontal cell size - y-direction (DDY) in meters (microscale flow field model)
#   Line 3: Vertical grid size for lowest layer (in meters) + stretching factor
#           (Optional: height-dependent stretching factors can be added as pairs: height(m) factor)
#   Line 4: Number of grid cells - x-direction (concentration grid)
#   Line 5: Number of grid cells - y-direction (concentration grid)
#   Line 6: Number of horizontal concentration grid slices
#   Line 7: Source groups to be computed (comma-separated)
#   Lines 8-11: Domain boundaries (x_min, x_max, y_min, y_max)
# **Notes**:
#   - Typical grid sizes: 2-20 m horizontal, 1-5 m vertical
#   - Domain size must be integer multiple of chosen grid sizes
#   - GUI auto-generates this file
# **If Missing**: Simulation will not start; error in LogfileGRALCore.txt

