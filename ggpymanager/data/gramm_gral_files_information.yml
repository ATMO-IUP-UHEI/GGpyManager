## LEGEND FOR THIS DOCUMENT

**Status Categories**:
- [MANDATORY] = File MUST exist; model fails without it
- [MANDATORY-CONDITIONAL] = Required for specific coupling modes or features
- [OPTIONAL] = File can be omitted; model uses defaults
- [OPTIONAL-RECOMMENDED] = File optional but recommended for better results
- [OUTPUT] = Generated by the model

**Typical Defaults**:
- When optional file missing: Model either skips feature or uses built-in defaults
- Specific defaults noted for each file where applicable

**Critical Dependencies**:
- in.dat must exist and be correctly formatted
- Meteorological input (meteopgt.all OR inputzr.dat OR sonic.dat) must exist
- Source definition (point.dat, cadastre.dat, line.dat) can be absent for no-source scenario

---

## TROUBLESHOOTING: MISSING FILE CONSEQUENCES

| File | Status | If Missing | Error Message Location |
|------|--------|-----------|------------------------|
| GRAL.geb | MANDATORY | Simulation fails to start | LogfileGRALCore.txt |
| in.dat | MANDATORY | Missing control parameters | LogfileGRALCore.txt |
| Meteopgt.all | MANDATORY (default) | Unless alt. meteo file specified | LogfileGRALCore.txt |
| ggeom.asc | CONDITIONAL | Fails if GRAMM coupled | LogfileGRALCore.txt |
| landuse.asc | CONDITIONAL | Warning; uses default land-use | GUI warning dialog |
| Buildings.dat | OPTIONAL | No building effects computed | (No error, feature disabled) |
| Receptor.dat | OPTIONAL | No receptor output generated | (No error, feature disabled) |
| Pollutant.txt | MANDATORY | Pollutant undefined | LogfileGRALCore.txt |
| mettimeseries.dat | CONDITIONAL | Required in transient mode | LogfileGRALCore.txt |

