## POLLUTION AND DEPOSITION CONFIGURATION

### Pollutant.txt
# **Status**: [MANDATORY]
# **Used by**: GRAL.exe
# **Purpose**: Specifies pollutant name and wet deposition parameters
# **Format**: Text file, one line
# **Content**:
#   Line 1: Pollutant name
#   Line 2+: Wet deposition parameters (optional, default = 0)
#     - Washout coefficients for precipitation calculations
#     - Default 0 = no wet deposition
#   Additional lines (optional):
#     - Decay rates per source group (V18.1+)
# **Special Case - Odour Simulations**:
#   - If Pollutant.txt contains "odour"
#   - GRAL calculates concentration fluctuation intensity (odour hours)
#   - Requires concentration-variance model (separate .odr output)
# **Default Behavior if Missing**: Simulation fails; pollutant undefined
# **Notes**:
#   - Standard names: NO2, SO2, PM10, PM2.5, NH3, odour
#   - Wet deposition only in transient mode
#   - Requires Precipitation.txt if washout parameters > 0

### Precipitation.txt
# **Status**: [OPTIONAL] (required only if wet deposition needed)
# **Used by**: GRAL.exe (transient mode only)
# **Purpose**: Provides time series of precipitation rates
# **When Required**:
#   - Transient mode simulation
#   - Pollutant.txt contains non-zero washout parameters
#   - Wet deposition calculation desired
# **Format**: Text file, one line per time step
# **Structure**:
#   - Date (format: DD-MM-YYYY, DD.MM.YYYY, or DD:MM:YYYY)
#   - Hour (format: HH or HH:MM or HH.MM)
#   - Precipitation rate (mm/hour)
#   - Delimiter: tab character
# **Alignment Requirement**:
#   - Number of entries MUST EXACTLY match mettimeseries.dat entries
#   - Line order must correspond to weather situations in mettimeseries.dat
# **Default Behavior if Missing**: No wet deposition computed
# **Notes**:
#   - Decimal separator: dot (.)
#   - For non-rainy periods: use 0
#   - Critical: entry count must match meteorological time series

