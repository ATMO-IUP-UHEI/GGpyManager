## METEOROLOGICAL INPUT FILES

### meteopgt.all
# **Status**: [MANDATORY] OR [CONDITIONAL]
# **Used by**: GRAL.exe, GRAMM.exe, GUI
# **Purpose**: Categorized meteorological input data (default method)
# **When Required**:
#   - Default meteorological input for GRAL simulations
#   - Used when in.dat Line 4 specifies meteopgt.all method
#   - Alternative to inputzr.dat or sonic.dat
# **Format**: Classified weather situations (frequency bins)
# **Structure**:
#   Line 1: Anemometer height (m), data type code, wind direction sector width (degrees)
#   Line 2: (Separator/blank line)
#   Line 3+: Weather situations (one per line)
#   Columns: Wind direction, wind speed, stability class, frequency
# **Notes**:
#   - Typical anemometer height: 10 m
#   - For detailed structure, see GRAMM documentation
#   - Required for both steady-state and transient modes
# **If Missing**: Simulation requires inputzr.dat or sonic.dat instead

### inputzr.dat
# **Status**: [OPTIONAL]
# **Used by**: GRAL.exe
# **Purpose**: Alternative meteorological input (vertical profile method)
# **When to Use**:
#   - When detailed vertical wind profiles available
#   - Preferred over meteopgt.all in specific atmospheric conditions
#   - Particularly useful for tunnel portal dispersion calculations
# **Format**: Vertical profile data points
# **Structure**:
#   Line 1: Number of profile measurement heights
#   Line 2: Heights of observations (comma-separated, e.g., 2, 10, 15 m)
#   Line 3+: Time series data - one line per time step
#   Columns: Hour (not used), friction velocity (m/s), Obukhov length (m), 
#            boundary layer height (m, use -1 if unknown), 
#            turbulence std devs at each height (u', v', w', repeat for each height),
#            [Optional: tunnel portal data if applicable]
# **Default Behavior if Missing**: Model uses meteopgt.all instead
# **Notes**:
#   - Use when mesoscale output or tower data available
#   - Column structure repeats for multiple measurement heights
#   - For tunnel portals: add exit velocity and temperature difference columns

### sonic.dat
# **Status**: [OPTIONAL]
# **Used by**: GRAL.exe
# **Purpose**: Alternative meteorological input (sonic anemometer data)
# **When to Use**:
#   - When high-frequency turbulence measurements available
#   - For low wind speed conditions (< 2 m/s) with meandering effects
# **Format**: Sonic anemometer time series
# **Structure**:
#   Line 1: Height of sonic anemometer above ground (m)
#   Line 2+: Individual measurement periods - one line each
#   Columns: Wind speed (m/s), wind direction (degrees), friction velocity (m/s),
#            std dev along-wind (m/s), std dev cross-wind (m/s), std dev vertical (m/s),
#            Obukhov length (m), dissipation rate (m²/s³, not used yet),
#            meandering parameter (m), meandering parameter T3 (s)
# **Default Behavior if Missing**: Model uses meteopgt.all instead
# **Notes**:
#   - Excellent for complex terrain and low-wind studies
#   - Columns 9-10: See Anfossi et al. (2005), Oettl et al. (2006)

