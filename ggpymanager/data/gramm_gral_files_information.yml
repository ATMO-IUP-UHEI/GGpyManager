## RECEPTOR POINTS

### receptor.dat
# **Status**: [OPTIONAL]
# **Used by**: GRAL.exe, GUI
# **Purpose**: Defines receptor points for time series concentration output
# **When Required**: Only if time series output at specific locations needed
# **Format**: Text file, one receptor per line (after count line)
# **Structure**:
#   Line 1: Total number of receptor points
#   Line 2+: Receptor point data
#   Columns:
#     1. Receptor number (ascending order)
#     2. X-coordinate (m)
#     3. Y-coordinate (m)
#     4. Z-coordinate above ground (m)
#     5. [OPTIONAL] Receptor name (string)
#     6. [OPTIONAL] User-defined receptor value (numeric)
# **Output Files Generated**:
#   - zeitreihe.dat (up to V20.01)
#   - ReceptorTimeseries.dat (V20.09+)
#   - ReceptorTimeseriesTransient.txt (transient mode)
# **Default Behavior if Missing**: No receptor time series output
# **Notes**:
#   - Up to 9999 receptors practical limit
#   - Coordinates in model coordinate system
#   - Heights relative to ground (column 4)

