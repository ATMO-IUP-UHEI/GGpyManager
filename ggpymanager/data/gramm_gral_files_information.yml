## MAIN CONTROL FILE

### in.dat
# **Status**: [MANDATORY]
# **Used by**: GRAL.exe, GUI
# **Purpose**: Main control parameters for GRAL simulation
# **Format**: Text file, one parameter per line
# **Structure**:
#   Line 1: Number of particles released per second (typical: 100-1000)
#   Line 2: Dispersion time in seconds (e.g., 1800 for 30 min, 3600 for 1 hour)
#           - Minimum: 300 s (due to turbulence parameterization validity)
#   Line 3: Steady-state flag: 1 = steady-state, 0 = transient
#   Line 4: Meteorological input file selection flag
#           1 = meteopgt.all, 2 = inputzr.dat, 3 = sonic.dat, 4-5 = GRAMM-coupled
#   Line 5: Receptor points flag: 1 = yes (use receptor.dat), 0 = no
#   Line 6: Surface roughness length in meters (typical: 0.01-1.0)
#           SPECIAL BEHAVIOR: If GRAMM wind fields used WITH landuse.asc present,
#           this value becomes the MINIMUM surface roughness (Adaptive Roughness mode)
#   Line 7: Latitude in degrees (typically 40-60 for Austria/Europe)
#   Line 8: Plume meandering: J = on, N = on (N recommended), off = no
#   Line 9: [UNUSED] - Pollutant defined in Pollutant.txt instead
#   Line 10: Heights of horizontal concentration slices above ground (m, comma-separated)
#            Examples: "1.5,10,50" for 3 slices; max 9 slices
#   Line 11: Vertical extension of concentration grid (m, typical: 1-5)
#   Line 12: Start weather situation number (usually 1; updated when pausing/resuming)
#   Line 13: Building consideration flag:
#            0 = no buildings, 1 = diagnostic approach (large domains only),
#            2 = prognostic approach (default, recommended)
#            Second number: cells around obstacles for prognostic calculation (default: 15)
#   Line 14: Concentration file output format:
#            0 or -2 = standard format (use -2 for GUI post-processing)
#            1 = reserved for Soundplan format
#   Line 15: Result file compression:
#            "compressed" = all outputs in .grz (zipped) files [DEFAULT, RECOMMENDED]
#            "compressed V02" = optimized compression (V20.01+, smaller & error-proof)
#            "compressed V03" = all cells written, most error-proof (V20.01+)
#            "not compressed" = separate .con, .odr, .dep files
#   Line 16: CMD window behavior: "WaitForKeyStroke" or blank (no wait)
#   Line 17: ASCII results flag:
#            "ASCiiResults 0" = no additional ASCII files [DEFAULT]
#            "ASCiiResults 1" = generate ASCII concentration files (very large)
#   Line 18: Adaptive surface roughness - maximum value (m):
#            0 = adaptive roughness OFF [DEFAULT]
#            >0 = adaptive roughness ON (value = maximum allowed roughness)
#   Line 19: Radius around sources for prognostic subdomain creation (m, typical: 300-1000)
#            Affects memory and calculation time in complex terrain
#   Line 20: GRAL online functions flag:
#            1 = use GRAL online functions [DEFAULT]
#            0 = disable online functions (reduces file accesses)
# **Critical Notes**:
#   - Particle count affects accuracy and CPU time (linear relationship)
#   - Dispersion time determines averaging period and turbulence parameterization validity
#   - Must match meteorological input file selection
#   - Line 6 behavior changes when coupled with GRAMM + landuse.asc
# **If Missing**: Simulation will not start; specific error in LogfileGRALCore.txt

