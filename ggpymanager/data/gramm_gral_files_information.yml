# =====================================================================
# IMPORTANT NOTES
# =====================================================================
notes:
  version_compatibility:
    - "GRAL-ST-ROG is based on GRAL 20.01 branch, NOT GRAL 22.09"
    - "Some features in GRAL 22.09 may not be available in GRAL-ST-ROG"
    - "File formats are largely compatible but physics implementations differ"
  
  file_naming:
    - "Weather situations: 5-digit format (00001, 00002, etc.)"
    - "Source groups: 2-digit format (01-99 in older versions, 01-999 in ST-ROG)"
    - "Slices: 1-digit format (1-9)"
  
  absolute_vs_relative_heights:
    - "Positive heights = relative to ground level"
    - "Negative heights = absolute heights above sea level"
    - "Absolute heights require topography; error without terrain file"
  
  transient_vs_steady_state:
    steady_state: "Multiple classified situations; uses meteopgt.all"
    transient: "Continuous time series; uses mettimeseries.dat"
  
  compression:
    - ".grz format: zipped container for .con, .odr, .dep files"
    - "Saves disk space; enabled in in.dat line 15"
  
  decimal_separators:
    - "Use dot (.) as decimal separator for best compatibility"
    - "GUI handles local culture but models expect invariant format"

