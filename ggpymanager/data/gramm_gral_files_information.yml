## SOURCE DEFINITION FILES

### point.dat
# **Status**: [OPTIONAL]
# **Used by**: GRAL.exe
# **Purpose**: Defines point sources (stacks, industrial sources)
# **When Required**: Only if point sources exist in simulation
# **Format**: Text file, one source per line (after header)
# **Structure**:
#   Line 1: [Header - not used by model]
#   Line 2: [Header - not used by model]
#   Line 3+: Point source data
#   Columns:
#     1. X-coordinate (m)
#     2. Y-coordinate (m)
#     3. Z-coordinate above ground (m) - or absolute if using absolute heights
#     4. Emission rate (kg/h)
#     5. [NOT USED ANYMORE]
#     6. [NOT USED ANYMORE]
#     7. [NOT USED ANYMORE]
#     8. Exit velocity (m/s)
#     9. Stack diameter (m)
#     10. Exit temperature (K)
#     11. Source group number
#     12. Share of PM2.5 emissions (%), OPTIONAL
#     13. Share of PM10 emissions (%), OPTIONAL
#     14. Particle diameter of PM30 emissions (m), OPTIONAL
#     15. Particle density (kg/m³), OPTIONAL
#     16. Dry deposition velocity for PM2.5 (m/s), OPTIONAL
#     17. Dry deposition velocity for PM10 (m/s), OPTIONAL
#     18. Dry deposition velocity for PM30 (m/s), OPTIONAL
#     19. Mode: 1 = applies to PM2.5 only, 2 = applies to PM2.5+PM10, OPTIONAL
#   Additional optional columns:
#     "Temp" = Reference name of exit temperature time series (for transient mode)
#     "Vel" = Reference name of exit velocity time series (for transient mode)
# **Default Behavior if Missing**: No point sources computed
# **Notes**:
#   - Columns 12-19 are optional; default = 0 (no PM emissions)
#   - For elevated sources (stacks): use positive exit velocity
#   - Temperature and velocity time series linked via TimeSeriesPointSourceVel.txt and TimeSeriesPointSourceTemp.txt

### cadastre.dat
# **Status**: [OPTIONAL]
# **Used by**: GRAL.exe
# **Purpose**: Defines area sources (farms, warehouses, industrial areas)
# **When Required**: Only if area sources exist in simulation
# **Format**: Text file, one area source per line (after header)
# **Structure**:
#   Line 1: [Header - not read by model]
#   Line 2+: Area source data
#   Columns:
#     1. X-coordinate of source center (m)
#     2. Y-coordinate of source center (m)
#     3. Z-coordinate (mean height above ground, m)
#     4. Extension in x-direction (m)
#     5. Extension in y-direction (m)
#     6. Extension in z-direction / vertical height (m)
#     7. Emission rate (kg/h)
#     8. [NOT USED ANYMORE]
#     9. [NOT USED ANYMORE]
#     10. [NOT USED ANYMORE]
#     11. Source group number
#     12. Share of PM2.5 emissions (%), OPTIONAL
#     13. Share of PM10 emissions (%), OPTIONAL
#     14. Particle diameter of PM30 (m), OPTIONAL
#     15. Particle density (kg/m³), OPTIONAL
#     16. Dry deposition velocity for PM2.5 (m/s), OPTIONAL
#     17. Dry deposition velocity for PM10 (m/s), OPTIONAL
#     18. Dry deposition velocity for PM30 (m/s), OPTIONAL
#     19. Mode: 1 = PM2.5 only, 2 = PM2.5+PM10, OPTIONAL
# **Default Behavior if Missing**: No area sources computed
# **Notes**:
#   - Columns 12-19 are optional; default = 0
#   - GUI automatically splits into rasterized sub-areas

### line.dat
# **Status**: [OPTIONAL]
# **Used by**: GRAL.exe
# **Purpose**: Defines line sources (roads, railways, facility perimeters)
# **When Required**: Only if line sources exist in simulation
# **Format**: Text file, one line source per line (after headers)
# **Structure**:
#   Lines 1-5: [Header - not read by model]
#   Line 6+: Line source data
#   Columns:
#     1. Name of line source (string)
#     2. Section number (integer)
#     3. Source group number
#     4. X-coordinate of first point (m)
#     5. Y-coordinate of first point (m)
#     6. Z-coordinate of first point (m; <0 = relative height, ≥0 = relative height)
#     7. X-coordinate of second point (m)
#     8. Y-coordinate of second point (m)
#     9. Z-coordinate of second point (m)
#     10. Width of line source (m)
#     11. Vertical extension specification:
#         0 (positive value): adds to z-coordinates, vert. ext. = 1 m
#         0 (zero): lower height from z-coordinates, vert. ext. = 3 m [DEFAULT]
#         0 (negative value): lower height from z-coordinates, vert. ext. = |value| m
#     12. [NOT USED]
#     13. [NOT USED]
#     14. Emission rate (kg/h/km)
#     15. [NOT USED ANYMORE]
#     16. [NOT USED ANYMORE]
#     17. [NOT USED ANYMORE]
#     18. [NOT USED ANYMORE]
#     19. Share of PM2.5 (%), OPTIONAL
#     20. Share of PM10 (%), OPTIONAL
#     21. Particle diameter PM30 (m), OPTIONAL
#     22. Particle density (kg/m³), OPTIONAL
#     23. Dry deposition velocity PM2.5 (m/s), OPTIONAL
#     24. Dry deposition velocity PM10 (m/s), OPTIONAL
#     25. Dry deposition velocity PM30 (m/s), OPTIONAL
#     26. Mode: 1 = PM2.5 only, 2 = PM2.5+PM10, OPTIONAL
# **Default Behavior if Missing**: No line sources computed
# **Notes**:
#   - Used for road traffic and linear industrial sources
#   - Can be ascending or descending (V20.01+)
#   - Emission rates in kg/h/km (per unit length)

### portals.dat
# **Status**: [OPTIONAL]
# **Used by**: GRAL.exe
# **Purpose**: Defines tunnel portal sources (highway/rail tunnel exits)
# **When Required**: Only if modeling tunnel jet dispersion
# **Format**: Text file, one portal per line (after headers)
# **Structure**:
#   Lines 1-2: [Header - not read by model]
#   Line 3+: Portal source data
#   Columns:
#     1. X-coordinate of corner 1 (m) - RIGHT-HAND side when looking OUT
#     2. Y-coordinate of corner 1 (m)
#     3. X-coordinate of corner 2 (m) - LEFT-HAND side when looking OUT
#     4. Y-coordinate of corner 2 (m)
#     5. Lower Z-coordinate above ground (m)
#     6. Upper Z-coordinate above ground (m)
#     7. Emission rate (kg/h)
#     8. [NOT USED ANYMORE]
#     9. [NOT USED ANYMORE]
#     10. [NOT USED ANYMORE]
#     11. Source group number
#     12. Share of PM2.5 (%), OPTIONAL
#     13. Share of PM10 (%), OPTIONAL
#     14. Particle diameter PM30 (m), OPTIONAL
#     15. Particle density (kg/m³), OPTIONAL
#     16. Dry deposition velocity PM2.5 (m/s), OPTIONAL
#     17. Dry deposition velocity PM10 (m/s), OPTIONAL
#     18. Dry deposition velocity PM30 (m/s), OPTIONAL
#     19. Mode: 1 = PM2.5 only, 2 = PM2.5+PM10, OPTIONAL
#   Optional columns:
#     "Temp" = Reference name of temperature difference time series
#     "Vel" = Reference name of exit velocity time series
# **Default Behavior if Missing**: No tunnel sources computed
# **Notes**:
#   - Corner order critical: imagine standing INSIDE tunnel looking OUT
#   - Corner 1 = right-hand side, Corner 2 = left-hand side
#   - Exit velocity is horizontal (along tunnel direction)
#   - For transient mode, link to time series files

